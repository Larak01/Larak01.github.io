<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Lara AL KHATIB — Data Analyst spécialisée en fiabilité IA & stratégie financière."/>
    <title>Lara AL KHATIB — Data Analyst & AI</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@300;400;600;700&amp;family=DM+Sans:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
    
    <style>
        :root {
            --ink: #05070a;
            --ink2: #0d1120;
            --cream: #f0f4f8;
            --gold: #2563eb;
            --gold2: #3b82f6;
            --accent: #c5a059;
            --muted: #94a3b8;
            --transition: 0.4s cubic-bezier(0.87, 0, 0.13, 1);
        }

        * { box-sizing: border-box; margin:0; padding:0; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--ink);
            color: var(--cream);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ── TYPOGRAPHIE AMÉLIORÉE ── */
        .big-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2.8rem, 5vw, 4.8rem);
            font-weight: 600;
            line-height: 1.05;
            letter-spacing: -0.03em;
        }
        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 4vw, 3.2rem);
            font-weight: 600;
            line-height: 1.1;
        }

        /* Sidebar plus raffinée */
        .sidebar {
            position: fixed;
            left: 0; top: 0; bottom: 0;
            width: 80px;
            background: var(--ink2);
            border-right: 1px solid rgba(255,255,255,0.06);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 0;
            gap: 0.75rem;
        }

        .side-btn {
            width: 48px; height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--transition);
        }

        .side-btn:hover, .side-btn.active {
            background: rgba(255,255,255,0.08);
            color: var(--gold);
            transform: scale(1.05);
        }

        /* Pages */
        .pages-wrap { position: fixed; inset: 0 0 0 80px; overflow: hidden; }
        .page {
            position: absolute; inset: 0;
            opacity: 0; visibility: hidden;
            transition: opacity 0.6s var(--transition);
            overflow-y: auto;
        }
        .page.current { opacity: 1; visibility: visible; }

        /* Hero */
        .hero-left { padding: 6rem 5rem 5rem 5rem; }
        .hero-photo {
            object-fit: cover;
            filter: brightness(0.95) contrast(1.05);
        }

        /* Skills - GitHub Dark amélioré */
        #pg-skills {
            background: #0d1117;
            color: #e6edf3;
        }
        .skill-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1rem;
        }
        .skill-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 1.25rem;
            transition: all 0.3s ease;
        }
        .skill-box:hover {
            border-color: #58a6ff;
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.15);
        }

        /* Boutons améliorés */
        .btn {
            padding: 0.85rem 1.8rem;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-gold {
            background: var(--gold);
            color: var(--ink);
        }
        .btn-gold:hover {
            background: var(--gold2);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(37,99,235,0.4);
        }

        /* Responsive */
        @media (max-width: 800px) {
            :root { --sw: 0px; }
            .sidebar { display: none; }
            .hero-left { padding: 4rem 2rem; }
        }
    </style>
</head>
<body>

<!-- CURTAIN -->
<div id="curtain" style="position:fixed;inset:0;z-index:9000;display:grid;grid-template-columns:repeat(6,1fr);pointer-events:none;">
    <div class="curtain-strip" style="background:#0d1120"></div>
    <div class="curtain-strip" style="background:#0d1120"></div>
    <div class="curtain-strip" style="background:#0d1120"></div>
    <div class="curtain-strip" style="background:#0d1120"></div>

</div>

    <span id="curtain-text" style="font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,6vw,5rem);font-weight:300;font-style:italic;color:#fff;letter-spacing:0.05em;"></span>
</div>

    <button class="side-btn" data-page="2" aria-label="Expérience"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></button>
    <button class="side-btn" data-page="3" aria-label="Projets"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></button>
    <button class="side-btn" data-page="4" aria-label="Formation"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg></button>
    <button class="side-btn" data-page="5" aria-label="Compétences"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3 6 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z"/></svg></button>
    <button class="side-btn" data-page="6" aria-label="Contact"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></button>

    <div style="margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:12px;">
        <div class="avail-pill" style="width:10px;height:10px;background:#4ade80;border-radius:50%;box-shadow:0 0 0 4px rgba(74,222,128,.2);animation:pulse 2s infinite;"></div>
        <button id="lang-btn" style="width:52px;height:32px;background:rgba(37,99,235,.15);border:1px solid rgba(37,99,235,.4);border-radius:9999px;color:var(--gold);font-weight:600;font-size:0.8rem;">EN</button>
    </div>
</aside>

<!-- PAGES -->
<div class="pages-wrap">
