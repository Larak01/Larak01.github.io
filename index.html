<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lara AL KHATIB — Data Analyst & AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & BASE ── */
*,*::before,*::after{box-sizing:border-box; margin:0; padding:0}

:root {
  /* Nouvelle Palette : Bleu & Beige */
  --navy: #0a192f;       /* Bleu nuit profond */
  --navy-light: #112240; /* Variante pour les cartes */
  --beige: #f5f5dc;      /* Beige crème pour le texte et accents */
  --beige-dark: #d4d4b1; /* Beige foncé pour les bordures */
  --white: #ffffff;
  --accent: #2563eb;     /* Bleu électrique pour les petites interactions */
  
  /* UI Elements */
  --muted: #8892b0;
  --border: rgba(245, 245, 220, 0.15);
  --sw: 80px; 
  
  /* Motion */
  --ease-expo: cubic-bezier(0.87, 0, 0.13, 1);
  --transition: 0.4s var(--ease-expo);
}

html {
  scroll-behavior: auto;
  font-size: 16px;
  background-color: var(--navy);
}

body {
  background: var(--navy);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  line-height: 1.6;
}

/* ═══════════════════════════════════════
   PAGE SYSTEM
═══════════════════════════════════════ */
.pages-wrap{ position:fixed; inset:0 0 0 var(--sw); overflow:hidden; }
.page{ position:absolute; inset:0; overflow-y:auto; overflow-x:hidden; opacity:0; visibility:hidden; display:flex; flex-direction:column; }
.page.current{ opacity:1; visibility:visible; }

/* ── SIDEBAR ── */
.sidebar{
  position:fixed; left:0; top:0; bottom:0; width:var(--sw);
  background: var(--navy-light);
  border-right: 1px solid var(--border);
  z-index:8000; display:flex; flex-direction:column; align-items:center; padding:1.5rem 0;
}
.side-logo{ font-family:'Cormorant Garamond',serif; color:var(--beige); font-weight:700; margin-bottom:1rem; }
.side-btn{ width:44px; height:44px; cursor:pointer; background:transparent; border:none; color:var(--muted); transition:0.3s; margin: 5px 0; }
.side-btn:hover, .side-btn.active{ color:var(--beige); transform: scale(1.1); }
.side-btn svg{ width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.5; }

/* ═══════════════════════════════════════
   HERO PAGE (PHOTO CORRIGÉE)
═══════════════════════════════════════ */
#pg-hero { background: var(--navy); }
.hero-container {
  display: flex;
  height: 100%;
  align-items: center;
  justify-content: space-between;
  padding: 0 5%;
}

.hero-left {
  max-width: 600px;
  z-index: 2;
}

/* CORRECTION PHOTO : Taille et Cadrage */
.hero-right {
  position: relative;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.hero-photo {
  width: 100%;
  max-width: 420px; /* Taille limitée pour ne pas écraser le texte */
  height: 550px;    /* Hauteur fixe pour un look magazine */
  object-fit: cover;
  object-position: center 10%; /* Recadre sur le haut du visage */
  border-radius: 200px 200px 20px 20px; /* Forme élégante */
  border: 1px solid var(--border);
  box-shadow: 0 30px 60px rgba(0,0,0,0.5);
}

.hero-tag { color: var(--beige); font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1rem; }
.big-title { font-family: 'Cormorant Garamond', serif; font-size: 4rem; line-height: 1.1; margin-bottom: 1.5rem; }
.big-title em { color: var(--beige); font-style: italic; font-weight: 300; }

.btn-primary {
  background: var(--beige);
  color: var(--navy);
  padding: 0.8rem 2rem;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
}
.btn-primary:hover { background: var(--white); transform: translateY(-3px); }

/* Animation rideau */
#curtain{ position:fixed; inset:0; z-index:9000; display:grid; grid-template-columns:repeat(6,1fr); pointer-events:none; }
.curtain-strip{ background:var(--beige); transform:scaleY(0); transform-origin:top; transition: transform 0.6s var(--ease-expo); }
body.curtain-down .curtain-strip{ transform:scaleY(1); }

@media(max-width:1000px){
  .hero-container { flex-direction: column; text-align: center; padding-top: 5rem; }
  .hero-photo { height: 350px; max-width: 280px; margin-top: 2rem; }
  .big-title { font-size: 2.5rem; }
}
</style>
</head>

<script>
// Garde ton script original ici, il fonctionne parfaitement avec la structure.
// Ajoute juste cette petite fonction pour le rideau bleu/beige :
function goTo(idx){
  const PAGES=[
    {id:'pg-hero', en:'Home', fr:'Accueil'},
    {id:'pg-about', en:'Profile', fr:'Profil'},
    {id:'pg-proj', en:'Projects', fr:'Projets'},
  ];
  const curtain = document.getElementById('curtain');
  document.body.classList.add('curtain-down');
  
  setTimeout(() => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('current'));
    document.getElementById(PAGES[idx].id).classList.add('current');
    document.body.classList.remove('curtain-down');
  }, 600);
}
</script>
